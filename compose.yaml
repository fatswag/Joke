services:
  joke-app:
    build:
      context: ./joke-app
    container_name: joke-app
    restart: always
    env_file:
      - .env
    ports:
      - "${JOKE_CONTAINER_PORT}:${JOKE_PORT}"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MYSQL_CONTAINER_PORT}:${MYSQL_PORT}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ${DB_DIR}:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: